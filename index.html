
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple Land — местоположение магазина</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:16px;
text-align:center;
font-size:20px;
font-weight:bold;
}

#map{
height:100vh;
width:100%;
}

.store-card{
width:230px;
}

.store-card img{
width:100%;
border-radius:8px;
margin-bottom:8px;
}

.store-name{
font-size:16px;
font-weight:bold;
margin-bottom:4px;
}

.rating{
color:#f5a623;
font-weight:bold;
margin-bottom:6px;
}

.info{
font-size:13px;
margin-bottom:6px;
}

.phone{
font-size:14px;
font-weight:bold;
}

.button{
display:inline-block;
margin-top:8px;
padding:6px 10px;
background:black;
color:white;
text-decoration:none;
border-radius:6px;
font-size:12px;
}

.sidebar{
position:fixed;
left:-380px;
top:0;
width:360px;
height:100%;
background:white;
box-shadow:4px 0 10px rgba(0,0,0,0.2);
z-index:1000;
transition:0.3s;
overflow-y:auto;
}

.sidebar.open{
left:0;
}

.sidebar-content{
padding:20px;
font-family:Arial, Helvetica, sans-serif;
}

.side-photo{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.side-rating{
color:#f5a623;
font-weight:bold;
margin-bottom:8px;
}

.side-info{
font-size:14px;
margin-bottom:10px;
}

.side-description{
font-size:13px;
margin-bottom:12px;
}

.review{
background:#f2f2f2;
padding:8px;
border-radius:6px;
margin-bottom:6px;
font-size:13px;
}


.close-btn{
position:absolute;
right:15px;
top:10px;
font-size:20px;
cursor:pointer;
font-weight:bold;
}


.buttons{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-top:8px;
}

</style>

</head>

<body>

<header>
Apple Land — местоположение магазина
</header>

<div id="map"></div>

<div id="sidebar" class="sidebar">
<div class="sidebar-content">

<h2 style="position:relative;">Apple Land <span class="close-btn" onclick="closeSidebar()">✕</span></h2>

<img src="store.PNG" class="side-photo">

<div class="side-rating">★★★★★ 8300+ отзывов</div>

<p class="side-info">
📍 Аргынбекова 81, Шымкент<br>
🕒 10:00 – 21:00 ежедневно<br>
📞 +7 (708) 386‑04‑78
</p>

<p class="side-description">
Официальный магазин техники в Шымкент.
Лучшие цены на рынке.
Рассрочка Kaspi 0-0-12.
Более 8300 довольных клиентов.
</p>

<div class="buttons">
<a class="button" href="https://www.instagram.com/appleland_official?igsh=MWs0a2g4bDV1ZWdqOQ==" target="_blank">Instagram</a>
<a class="button" href="https://apple-land.github.io/reviews/" target="_blank">Отзывы</a>
<a class="button" href="https://wa.me/+77083860478" target="_blank">WhatsApp</a>
</div>

</div>
</div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
function closeSidebar(){
document.getElementById('sidebar').classList.remove('open');
}
</script>


<script>

var map = L.map('map').setView([42.3618597, 69.6037711], 16);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '© OSM'
}).addTo(map);


var popupContent = `
<div class="store-card">

<img src="store.PNG">

<div class="store-name">Apple Land</div>

<div class="rating">★★★★★ 8300+ положительных отзывов</div>

<div class="info">
📍 Аргынбекова 81, Шымкент<br>
🕒 График работы: 10:00 – 21:00 ежедневно
</div>

<div class="phone">
📞 +7 (708) 386‑04‑78
</div>

<div class="buttons">
<a class="button" href="https://www.instagram.com/appleland_official?igsh=MWs0a2g4bDV1ZWdqOQ==" target="_blank">Instagram</a>
<a class="button" href="https://apple-land.github.io/reviews/" target="_blank">Отзывы</a>
<a class="button" href="https://wa.me/+77083860478" target="_blank">WhatsApp</a>
</div>

</div>
`;


var marker = L.marker([42.3618597, 69.6037711]).addTo(map);
marker.bindPopup(popupContent);

marker.on('click', function(){
document.getElementById('sidebar').classList.add('open');
});

map.on('click', function(){
document.getElementById('sidebar').classList.remove('open');
});



function closeSidebar(){
document.getElementById('sidebar').classList.remove('open');
}
</script>


</body>
</html>
